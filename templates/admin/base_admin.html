<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TanlaAI | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#f1f1f1",
                        "on-primary-container": "#fdfcff",
                        "secondary-fixed-dim": "#aacae9",
                        "surface-variant": "#e2e2e2",
                        "surface-tint": "#006497",
                        "background": "#f9f9f9",
                        "outline": "#6f7881",
                        "on-secondary-container": "#43627d",
                        "tertiary": "#8b4c00",
                        "surface-container-high": "#e8e8e8",
                        "surface-dim": "#dadada",
                        "on-background": "#1a1c1c",
                        "on-tertiary-fixed": "#2e1500",
                        "surface-container-low": "#f3f3f3",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#cce5ff",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdcc2",
                        "surface-container-highest": "#e2e2e2",
                        "inverse-surface": "#2f3131",
                        "on-secondary-fixed": "#001d31",
                        "secondary": "#42617c",
                        "primary-container": "#007bb9",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#92ccff",
                        "surface-container": "#eeeeee",
                        "on-surface": "#1a1c1c",
                        "primary-fixed-dim": "#92ccff",
                        "tertiary-container": "#af6100",
                        "secondary-container": "#bddefd",
                        "primary": "#006193",
                        "on-primary-fixed-variant": "#004b73",
                        "on-secondary-fixed-variant": "#294a63",
                        "outline-variant": "#bfc7d2",
                        "on-surface-variant": "#3f4850",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed": "#001d31",
                        "on-tertiary-fixed-variant": "#6d3a00",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed-dim": "#ffb77a",
                        "surface": "#f9f9f9",
                        "primary-fixed": "#cce5ff"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-surface-container-low min-h-screen border-r border-outline/10 hidden md:block">
            <div class="p-8">
                <h1 class="text-xl font-extrabold tracking-tight text-primary">TanlaAI<br><span class="text-on-background/40 text-xs uppercase tracking-widest font-bold">Admin Panel</span></h1>
            </div>
            <nav class="mt-8 space-y-2 px-4">
                <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                    <span class="text-sm font-bold">Dashboard</span>
                </a>
                <a href="{% url 'admin_product_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if 'product' in request.resolver_match.url_name %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
                    <span class="text-sm font-bold">Products</span>
                </a>
                <a href="{% url 'admin_category_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if 'category' in request.resolver_match.url_name %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="category">category</span>
                    <span class="text-sm font-bold">Categories</span>
                </a>
                <a href="{% url 'admin_promotion_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if 'promotion' in request.resolver_match.url_name %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="local_offer">local_offer</span>
                    <span class="text-sm font-bold">Promotions</span>
                </a>
                <a href="{% url 'admin_company_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if 'company' in request.resolver_match.url_name %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="business">business</span>
                    <span class="text-sm font-bold">Companies</span>
                </a>
                <a href="{% url 'admin_user_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if 'user' in request.resolver_match.url_name %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="group">group</span>
                    <span class="text-sm font-bold">Users</span>
                </a>
                <a href="{% url 'admin_banner_list' %}" class="flex items-center gap-4 px-4 py-3 rounded-xl {% if 'banner' in request.resolver_match.url_name %}bg-primary text-on-primary shadow-lg shadow-primary/20{% else %}text-outline hover:bg-surface-container-high transition-colors{% endif %}">
                    <span class="material-symbols-outlined" data-icon="view_carousel">view_carousel</span>
                    <span class="text-sm font-bold">Banners</span>
                </a>
                <div class="pt-8"></div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 min-h-screen">
            <header class="h-20 bg-background flex items-center justify-between px-8 border-b border-outline/5 sticky top-0 z-50">
                <div class="md:hidden">
                    <span class="material-symbols-outlined text-primary" data-icon="menu">menu</span>
                </div>
                <div class="flex items-center gap-6 ml-auto">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-white shadow-sm">
                            <span class="material-symbols-outlined text-outline" data-icon="person">person</span>
                        </div>
                        <div class="hidden sm:block">
                            <p class="text-xs font-bold text-on-background">{{ request.user.username }}</p>
                            <p class="text-[10px] text-outline uppercase font-extrabold tracking-widest">Administrator</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-8">
                {% block admin_content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
