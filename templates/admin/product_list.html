{% extends 'admin/base_admin.html' %}

{% block admin_content %}
<div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
    <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-on-background">Products</h1>
        <p class="text-xs text-outline font-bold uppercase tracking-widest mt-1">Manage your digital boutique catalog</p>
    </div>
    
    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4">
        <!-- Search Bar -->
        <form method="GET" class="relative group min-w-[300px]">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl" data-icon="search">search</span>
            <input type="text" name="q" value="{{ query|default:'' }}" placeholder="Search products..." 
                hx-get="{% url 'admin_product_list' %}"
                hx-trigger="keyup changed delay:300ms, search"
                hx-target="#product-table-body"
                hx-indicator=".search-indicator"
                class="w-full bg-surface-container-low border border-outline/10 rounded-xl py-3.5 pl-12 pr-4 text-sm font-medium focus:ring-2 focus:ring-primary/10 focus:border-primary/20 outline-none transition-all">
            
            <div class="search-indicator htmx-indicator absolute right-12 top-1/2 -translate-y-1/2">
                <div class="w-4 h-4 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
            </div>

            {% if query %}
                <a href="{% url 'admin_product_list' %}" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-error transition-colors">
                    <span class="material-symbols-outlined text-lg" data-icon="close">close</span>
                </a>
            {% endif %}
        </form>

        <a href="{% url 'admin_product_create' %}" class="bg-primary text-on-primary px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-3 shadow-lg shadow-primary/20 hover:scale-[1.02] transform transition-all active:scale-95">
            <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
            <span class="whitespace-nowrap">New Product</span>
        </a>
    </div>
</div>

<div class="bg-surface-container-low rounded-3xl border border-outline/5 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-surface-container-high/50 border-b border-outline/5 text-outline text-[10px] font-extrabold uppercase tracking-widest">
                    <th class="px-8 py-6">Image</th>
                    <th class="px-8 py-6">Product details</th>
                    <th class="px-8 py-6">Price</th>
                    <th class="px-8 py-6">Category</th>
                    <th class="px-8 py-6">Status</th>
                    <th class="px-8 py-6 text-right">Actions</th>
                    <th class="px-8 py-6">Creator</th>
                </tr>
            </thead>
            <tbody id="product-table-body" class="divide-y divide-outline/5">
                {% include 'admin/partials/product_table_body.html' %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
